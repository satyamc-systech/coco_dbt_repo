version: 2

sources:
  - name: cortex_analyst_demo__insurance_raw
    database: CORTEX_ANALYST_DEMO
    schema: INSURANCE_RAW

    tables:
      - name: PAYMENTS
        columns:
          - name: PAYMENT_ID
            data_type: NUMBER
            description: "Unique identifier for the payment"
          - name: PAYMENT_NUMBER
            data_type: TEXT
            description: "Payment reference number"
          - name: CLAIM_ID
            data_type: NUMBER
            description: "Foreign key referencing the associated claim"
          - name: PAYMENT_TYPE
            data_type: TEXT
            description: "Type of payment"
          - name: PAYMENT_STATUS
            data_type: TEXT
            description: "Current status of the payment"
          - name: PAYMENT_METHOD
            data_type: TEXT
            description: "Method used for payment"
          - name: PAYMENT_AMOUNT
            data_type: NUMBER
            description: "Amount of the payment"
          - name: PAYMENT_DATE
            data_type: DATE
            description: "Date the payment was made"
          - name: DUE_DATE
            data_type: DATE
            description: "Payment due date"
          - name: CHECK_NUMBER
            data_type: TEXT
            description: "Check number if payment by check"
          - name: PAYEE_NAME
            data_type: TEXT
            description: "Name of the payee"
          - name: BANK_ACCOUNT
            data_type: TEXT
            description: "Masked bank account number"
          - name: CREATED_AT
            data_type: TIMESTAMP_NTZ
            description: "Timestamp when the record was created"
          - name: UPDATED_AT
            data_type: TIMESTAMP_NTZ
            description: "Timestamp when the record was last updated"
        tests:
          - dbt_expectations.expect_table_columns_to_match_set:
              column_list:
                - PAYMENT_ID
                - PAYMENT_NUMBER
                - CLAIM_ID
                - PAYMENT_TYPE
                - PAYMENT_STATUS
                - PAYMENT_METHOD
                - PAYMENT_AMOUNT
                - PAYMENT_DATE
                - DUE_DATE
                - CHECK_NUMBER
                - PAYEE_NAME
                - BANK_ACCOUNT
                - CREATED_AT
                - UPDATED_AT

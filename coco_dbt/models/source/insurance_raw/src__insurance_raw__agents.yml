version: 2

sources:
  - name: cortex_analyst_demo__insurance_raw
    database: CORTEX_ANALYST_DEMO
    schema: INSURANCE_RAW

    tables:
      - name: AGENTS
        columns:
          - name: AGENT_ID
            data_type: NUMBER
            description: "Unique identifier for the agent"
          - name: AGENT_CODE
            data_type: TEXT
            description: "Code assigned to the agent"
          - name: FIRST_NAME
            data_type: TEXT
            description: "First name of the agent"
          - name: LAST_NAME
            data_type: TEXT
            description: "Last name of the agent"
          - name: EMAIL
            data_type: TEXT
            description: "Email address of the agent"
          - name: PHONE
            data_type: TEXT
            description: "Phone number of the agent"
          - name: HIRE_DATE
            data_type: DATE
            description: "Date the agent was hired"
          - name: COMMISSION_RATE
            data_type: NUMBER
            description: "Commission rate for the agent"
          - name: STATUS
            data_type: TEXT
            description: "Current status of the agent"
          - name: CREATED_AT
            data_type: TIMESTAMP_NTZ
            description: "Timestamp when the record was created"
          - name: UPDATED_AT
            data_type: TIMESTAMP_NTZ
            description: "Timestamp when the record was last updated"
        tests:
          - dbt_expectations.expect_table_columns_to_match_set:
              column_list:
                - AGENT_ID
                - AGENT_CODE
                - FIRST_NAME
                - LAST_NAME
                - EMAIL
                - PHONE
                - HIRE_DATE
                - COMMISSION_RATE
                - STATUS
                - CREATED_AT
                - UPDATED_AT

version: 2

sources:
  - name: cortex_analyst_demo__producers
    database: CORTEX_ANALYST_DEMO
    schema: PRODUCERS

    tables:
      - name: FIRM
        columns:
          - name: FIRM_DIM_KEY
            data_type: NUMBER
            description: "Unique dimension key for the firm"
          - name: MASTER_FIRM_ID
            data_type: TEXT
            description: "Master firm identifier"
          - name: FIRM_NAME
            data_type: TEXT
            description: "Name of the firm"
          - name: FIRM_TYPE
            data_type: TEXT
            description: "Type of firm"
          - name: FIRM_STATUS
            data_type: TEXT
            description: "Current firm status"
          - name: FIRM_NPN
            data_type: TEXT
            description: "Firm National Producer Number"
          - name: FIRM_TAX_ID
            data_type: TEXT
            description: "Firm tax identification number"
          - name: FIRM_STATE
            data_type: TEXT
            description: "State where the firm is located"
          - name: FIRM_CITY
            data_type: TEXT
            description: "City where the firm is located"
          - name: FIRM_ZIP
            data_type: TEXT
            description: "Firm zip code"
          - name: EFFECTIVE_DATE
            data_type: DATE
            description: "Firm effective date"
          - name: EXPIRATION_DATE
            data_type: DATE
            description: "Firm expiration date"
          - name: CREATED_AT
            data_type: TIMESTAMP_NTZ
            description: "Record creation timestamp"
          - name: UPDATED_AT
            data_type: TIMESTAMP_NTZ
            description: "Record last updated timestamp"
        tests:
          - dbt_expectations.expect_table_columns_to_match_set:
              column_list:
                - FIRM_DIM_KEY
                - MASTER_FIRM_ID
                - FIRM_NAME
                - FIRM_TYPE
                - FIRM_STATUS
                - FIRM_NPN
                - FIRM_TAX_ID
                - FIRM_STATE
                - FIRM_CITY
                - FIRM_ZIP
                - EFFECTIVE_DATE
                - EXPIRATION_DATE
                - CREATED_AT
                - UPDATED_AT

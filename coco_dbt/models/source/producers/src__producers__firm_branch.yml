version: 2

sources:
  - name: cortex_analyst_demo__producers
    database: CORTEX_ANALYST_DEMO
    schema: PRODUCERS

    tables:
      - name: FIRM_BRANCH
        columns:
          - name: BRANCH_ID
            data_type: TEXT
            description: "Unique identifier for the branch"
          - name: MASTER_FIRM_ID
            data_type: TEXT
            description: "Foreign key to the parent firm"
          - name: BRANCH_NAME
            data_type: TEXT
            description: "Name of the branch office"
          - name: BRANCH_TYPE
            data_type: TEXT
            description: "Type of branch (MAIN, SATELLITE)"
          - name: BRANCH_STATUS
            data_type: TEXT
            description: "Current status of the branch"
          - name: BRANCH_ADDRESS
            data_type: TEXT
            description: "Street address of the branch"
          - name: BRANCH_CITY
            data_type: TEXT
            description: "City of the branch"
          - name: BRANCH_STATE
            data_type: TEXT
            description: "State of the branch"
          - name: BRANCH_ZIP
            data_type: TEXT
            description: "ZIP code of the branch"
          - name: BRANCH_PHONE
            data_type: TEXT
            description: "Phone number of the branch"
          - name: BRANCH_MANAGER
            data_type: TEXT
            description: "Name of the branch manager"
          - name: EFFECTIVE_DATE
            data_type: DATE
            description: "Date the branch became effective"
          - name: CREATED_AT
            data_type: TIMESTAMP_NTZ
            description: "Record creation timestamp"
          - name: UPDATED_AT
            data_type: TIMESTAMP_NTZ
            description: "Record last updated timestamp"
        tests:
          - dbt_expectations.expect_table_columns_to_match_set:
              column_list:
                - BRANCH_ID
                - MASTER_FIRM_ID
                - BRANCH_NAME
                - BRANCH_TYPE
                - BRANCH_STATUS
                - BRANCH_ADDRESS
                - BRANCH_CITY
                - BRANCH_STATE
                - BRANCH_ZIP
                - BRANCH_PHONE
                - BRANCH_MANAGER
                - EFFECTIVE_DATE
                - CREATED_AT
                - UPDATED_AT

version: 2

sources:
  - name: cortex_analyst_demo__producers
    database: CORTEX_ANALYST_DEMO
    schema: PRODUCERS

    tables:
      - name: FIRM_BRANCH
        columns:
          - name: BRANCH_ID
            data_type: TEXT
            description: "Unique identifier for the branch"
          - name: MASTER_FIRM_ID
            data_type: TEXT
            description: "Foreign key to the master firm"
          - name: BRANCH_NAME
            data_type: TEXT
            description: "Name of the branch"
          - name: BRANCH_TYPE
            data_type: TEXT
            description: "Type of branch"
          - name: BRANCH_STATUS
            data_type: TEXT
            description: "Current branch status"
          - name: BRANCH_ADDRESS
            data_type: TEXT
            description: "Branch street address"
          - name: BRANCH_CITY
            data_type: TEXT
            description: "Branch city"
          - name: BRANCH_STATE
            data_type: TEXT
            description: "Branch state"
          - name: BRANCH_ZIP
            data_type: TEXT
            description: "Branch zip code"
          - name: BRANCH_PHONE
            data_type: TEXT
            description: "Branch phone number"
          - name: BRANCH_MANAGER
            data_type: TEXT
            description: "Name of the branch manager"
          - name: EFFECTIVE_DATE
            data_type: DATE
            description: "Branch effective date"
          - name: CREATED_AT
            data_type: TIMESTAMP_NTZ
            description: "Record creation timestamp"
          - name: UPDATED_AT
            data_type: TIMESTAMP_NTZ
            description: "Record last updated timestamp"
        tests:
          - dbt_expectations.expect_table_columns_to_match_set:
              column_list:
                - BRANCH_ID
                - MASTER_FIRM_ID
                - BRANCH_NAME
                - BRANCH_TYPE
                - BRANCH_STATUS
                - BRANCH_ADDRESS
                - BRANCH_CITY
                - BRANCH_STATE
                - BRANCH_ZIP
                - BRANCH_PHONE
                - BRANCH_MANAGER
                - EFFECTIVE_DATE
                - CREATED_AT
                - UPDATED_AT

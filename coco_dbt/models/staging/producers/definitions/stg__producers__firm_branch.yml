version: 2

models:
  - name: stg__producers__firm_branch
    description: "Staging model for the FIRM_BRANCH table from PRODUCERS schema"

    columns:
      - name: branch_id
        data_type: text
        description: "Unique identifier for the branch"
        data_tests:
          - not_null
          - unique

      - name: master_firm_id
        data_type: text
        description: "Foreign key to the master firm"
        data_tests:
          - not_null

      - name: branch_name
        data_type: text
        description: "Name of the branch"

      - name: branch_type
        data_type: text
        description: "Type of branch"

      - name: branch_status
        data_type: text
        description: "Current branch status"

      - name: branch_address
        data_type: text
        description: "Branch street address"

      - name: branch_city
        data_type: text
        description: "Branch city"

      - name: branch_state
        data_type: text
        description: "Branch state"

      - name: branch_zip
        data_type: text
        description: "Branch zip code"

      - name: branch_phone
        data_type: text
        description: "Branch phone number"

      - name: branch_manager
        data_type: text
        description: "Name of the branch manager"

      - name: effective_date
        data_type: date
        description: "Branch effective date"

      - name: created_at
        data_type: timestamp_ntz
        description: "Record creation timestamp"

      - name: updated_at
        data_type: timestamp_ntz
        description: "Record last updated timestamp"

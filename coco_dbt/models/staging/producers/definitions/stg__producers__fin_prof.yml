version: 2

models:
  - name: stg__producers__fin_prof
    description: "Staging model for the FIN_PROF table from PRODUCERS schema"

    columns:
      - name: fin_prof_dim_key
        data_type: number
        description: "Unique dimension key for the financial professional"
        data_tests:
          - not_null
          - unique

      - name: producer_npn
        data_type: text
        description: "National Producer Number"
        data_tests:
          - not_null
          - unique

      - name: first_name
        data_type: text
        description: "Producer first name"

      - name: last_name
        data_type: text
        description: "Producer last name"

      - name: producer_type
        data_type: text
        description: "Type of producer"

      - name: license_state
        data_type: text
        description: "State where the producer is licensed"

      - name: license_status
        data_type: text
        description: "Current license status"

      - name: license_number
        data_type: text
        description: "License number"

      - name: email
        data_type: text
        description: "Producer email address"

      - name: phone
        data_type: text
        description: "Producer phone number"

      - name: designation
        data_type: text
        description: "Professional designation"

      - name: years_experience
        data_type: number
        description: "Years of experience"

      - name: active_flag
        data_type: boolean
        description: "Whether the producer is currently active"

      - name: created_at
        data_type: timestamp_ntz
        description: "Record creation timestamp"

      - name: updated_at
        data_type: timestamp_ntz
        description: "Record last updated timestamp"

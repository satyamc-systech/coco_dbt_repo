version: 2

models:
  - name: stg__insurance_raw__raw_annuity_txn
    description: "Staging model for the RAW_ANNUITY_TXN table from INSURANCE_RAW schema"

    columns:
      - name: txn_id
        data_type: text
        description: "Unique identifier for the annuity transaction"
        data_tests:
          - not_null
          - unique

      - name: policy_number
        data_type: text
        description: "Policy number associated with the transaction"

      - name: product_type
        data_type: text
        description: "Type of annuity product"

      - name: txn_type
        data_type: text
        description: "Transaction type"

      - name: txn_status
        data_type: text
        description: "Status of the transaction"

      - name: txn_date
        data_type: date
        description: "Date the transaction was initiated"

      - name: effective_date
        data_type: date
        description: "Effective date of the transaction"

      - name: premium_amount
        data_type: number
        description: "Premium amount of the transaction"

      - name: commission_amount
        data_type: number
        description: "Commission amount earned"

      - name: physical_branch_id
        data_type: text
        description: "Physical branch where the transaction originated"

      - name: master_firm_id
        data_type: text
        description: "Master firm associated with the transaction"

      - name: owner_first_name
        data_type: text
        description: "First name of the annuity owner"

      - name: owner_last_name
        data_type: text
        description: "Last name of the annuity owner"

      - name: owner_state
        data_type: text
        description: "State of the annuity owner"

      - name: annuitant_age
        data_type: number
        description: "Age of the annuitant at time of transaction"

      - name: surrender_period_yrs
        data_type: number
        description: "Surrender period in years"

      - name: interest_rate
        data_type: number
        description: "Guaranteed interest rate"

      - name: created_at
        data_type: timestamp_ntz
        description: "Record creation timestamp"

      - name: updated_at
        data_type: timestamp_ntz
        description: "Record last updated timestamp"

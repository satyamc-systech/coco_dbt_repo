version: 2

models:
  - name: stg__insurance_raw__customers
    description: "Staging model for the CUSTOMERS table from INSURANCE_RAW schema"

    columns:
      - name: customer_id
        data_type: number
        description: "Unique identifier for the customer"
        data_tests:
          - not_null
          - unique

      - name: customer_number
        data_type: text
        description: "Number assigned to the customer"
        data_tests:
          - not_null
          - unique

      - name: first_name
        data_type: text
        description: "First name of the customer"
        data_tests:
          - not_null

      - name: last_name
        data_type: text
        description: "Last name of the customer"
        data_tests:
          - not_null

      - name: date_of_birth
        data_type: date
        description: "Date of birth of the customer"
        data_tests:
          - not_null

      - name: email
        data_type: text
        description: "Email address of the customer"
        data_tests:
          - not_null
          - unique

      - name: phone
        data_type: text
        description: "Phone number of the customer"

      - name: address_line1
        data_type: text
        description: "Primary address line of the customer"

      - name: address_line2
        data_type: text
        description: "Secondary address line of the customer"

      - name: city
        data_type: text
        description: "City of the customer"

      - name: state
        data_type: text
        description: "State of the customer"

      - name: zip_code
        data_type: text
        description: "Zip code of the customer"

      - name: customer_type
        data_type: text
        description: "Type of customer"
        data_tests:
          - not_null

      - name: credit_score
        data_type: number
        description: "Credit score of the customer"

      - name: created_at
        data_type: timestamp_ntz
        description: "Timestamp when the record was created"

      - name: updated_at
        data_type: timestamp_ntz
        description: "Timestamp when the record was last updated"

    data_tests:
      - dbt_expectations.expect_table_columns_to_match_set:
          column_list:
            - customer_id
            - customer_number
            - first_name
            - last_name
            - date_of_birth
            - email
            - phone
            - address_line1
            - address_line2
            - city
            - state
            - zip_code
            - customer_type
            - credit_score
            - created_at
            - updated_at

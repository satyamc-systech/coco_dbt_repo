version: 2

models:
  - name: stg__producers__firm_branch
    description: "Staging model for firm branch offices"
    columns:
      - name: branch_id
        description: "Unique branch identifier"
        data_type: TEXT
        data_tests:
          - unique
          - not_null
      - name: master_firm_id
        description: "Parent firm identifier"
        data_type: TEXT
      - name: branch_name
        description: "Branch name"
        data_type: TEXT
      - name: branch_type
        description: "Branch type"
        data_type: TEXT
      - name: branch_status
        description: "Branch status"
        data_type: TEXT
      - name: branch_address
        description: "Branch address"
        data_type: TEXT
      - name: branch_city
        description: "Branch city"
        data_type: TEXT
      - name: branch_state
        description: "Branch state"
        data_type: TEXT
      - name: branch_zip
        description: "Branch ZIP"
        data_type: TEXT
      - name: branch_phone
        description: "Branch phone"
        data_type: TEXT
      - name: branch_manager
        description: "Branch manager"
        data_type: TEXT
      - name: effective_date
        description: "Effective date"
        data_type: DATE
      - name: created_at
        description: "Created timestamp"
        data_type: TIMESTAMP_NTZ
      - name: updated_at
        description: "Updated timestamp"
        data_type: TIMESTAMP_NTZ

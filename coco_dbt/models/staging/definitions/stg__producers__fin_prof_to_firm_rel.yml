version: 2

models:
  - name: stg__producers__fin_prof_to_firm_rel
    description: "Staging model for financial professional to firm relationships"
    columns:
      - name: relationship_id
        description: "Unique relationship identifier"
        data_type: NUMBER
        data_tests:
          - unique
          - not_null
      - name: fin_prof_dim_key
        description: "Foreign key to financial professional"
        data_type: NUMBER
      - name: firm_dim_key
        description: "Foreign key to firm"
        data_type: NUMBER
      - name: relationship_type
        description: "Relationship type"
        data_type: TEXT
      - name: relationship_status
        description: "Relationship status"
        data_type: TEXT
      - name: start_date
        description: "Relationship start date"
        data_type: DATE
      - name: end_date
        description: "Relationship end date"
        data_type: DATE
      - name: commission_split_pct
        description: "Commission split percentage"
        data_type: NUMBER
      - name: primary_flag
        description: "Primary relationship flag"
        data_type: BOOLEAN
      - name: created_at
        description: "Created timestamp"
        data_type: TIMESTAMP_NTZ
      - name: updated_at
        description: "Updated timestamp"
        data_type: TIMESTAMP_NTZ

version: 2

models:
  - name: stg__insurance_raw__payments
    description: "Staging model for the PAYMENTS table from INSURANCE_RAW schema"
    columns:
      - name: PAYMENT_ID
        data_type: NUMBER
        description: "Unique identifier for the payment"
        tests:
          - not_null
          - unique
      - name: PAYMENT_NUMBER
        data_type: TEXT
        description: "Payment number assigned to the payment"
        tests:
          - not_null
          - unique
      - name: CLAIM_ID
        data_type: NUMBER
        description: "Foreign key referencing the associated claim"
        tests:
          - not_null
      - name: PAYMENT_TYPE
        data_type: TEXT
        description: "Type of the payment"
        tests:
          - not_null
      - name: PAYMENT_STATUS
        data_type: TEXT
        description: "Current status of the payment"
        tests:
          - not_null
      - name: PAYMENT_METHOD
        data_type: TEXT
        description: "Method used for the payment"
        tests:
          - not_null
      - name: PAYMENT_AMOUNT
        data_type: NUMBER
        description: "Amount of the payment"
        tests:
          - not_null
      - name: PAYMENT_DATE
        data_type: DATE
        description: "Date the payment was made"
      - name: DUE_DATE
        data_type: DATE
        description: "Due date for the payment"
      - name: CHECK_NUMBER
        data_type: TEXT
        description: "Check number associated with the payment"
      - name: PAYEE_NAME
        data_type: TEXT
        description: "Name of the payee"
      - name: BANK_ACCOUNT
        data_type: TEXT
        description: "Bank account used for the payment"
      - name: CREATED_AT
        data_type: TIMESTAMP_NTZ
        description: "Timestamp when the record was created"
      - name: UPDATED_AT
        data_type: TIMESTAMP_NTZ
        description: "Timestamp when the record was last updated"

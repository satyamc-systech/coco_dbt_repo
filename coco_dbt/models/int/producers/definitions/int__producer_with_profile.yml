version: 2

models:
  - name: int__producer_with_profile
    description: "Intermediate model joining FIN_PROF_TO_FIRM_REL with FIN_PROF on FIN_PROF_DIM_KEY to create a full producer profile with firm relationship context"

    columns:
      - name: relationship_id
        data_type: number
        description: "Unique identifier for the producer-firm relationship"
        data_tests:
          - not_null
          - unique

      - name: fin_prof_dim_key
        data_type: number
        description: "Foreign key to FIN_PROF dimension"
        data_tests:
          - not_null

      - name: firm_dim_key
        data_type: number
        description: "Foreign key to FIRM dimension"
        data_tests:
          - not_null

      - name: relationship_type
        data_type: text
        description: "Type of relationship between producer and firm"

      - name: relationship_status
        data_type: text
        description: "Current status of the relationship"

      - name: start_date
        data_type: date
        description: "Relationship start date"

      - name: end_date
        data_type: date
        description: "Relationship end date"

      - name: commission_split_pct
        data_type: number
        description: "Commission split percentage"

      - name: primary_flag
        data_type: boolean
        description: "Whether this is the primary firm relationship"

      - name: producer_npn
        data_type: text
        description: "National Producer Number"

      - name: first_name
        data_type: text
        description: "Producer first name"

      - name: last_name
        data_type: text
        description: "Producer last name"

      - name: full_name
        data_type: text
        description: "Full name of the producer (first_name + last_name)"

      - name: producer_type
        data_type: text
        description: "Type of producer"

      - name: license_state
        data_type: text
        description: "State where the producer is licensed"

      - name: license_status
        data_type: text
        description: "Current license status"

      - name: license_number
        data_type: text
        description: "License number"

      - name: email
        data_type: text
        description: "Producer email address"

      - name: phone
        data_type: text
        description: "Producer phone number"

      - name: designation
        data_type: text
        description: "Professional designation"

      - name: years_experience
        data_type: number
        description: "Years of experience"

      - name: active_flag
        data_type: boolean
        description: "Whether the producer is currently active"

      - name: created_at
        data_type: timestamp_ntz
        description: "Record creation timestamp"

      - name: updated_at
        data_type: timestamp_ntz
        description: "Record last updated timestamp"

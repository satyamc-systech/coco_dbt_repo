version: 2

models:
  - name: int__firm_with_producer_rel
    description: "Intermediate model joining FIRM with FIN_PROF_TO_FIRM_REL on FIRM_DIM_KEY to enrich firm data with producer relationship details"

    columns:
      - name: firm_dim_key
        data_type: number
        description: "Firm dimension key"
        data_tests:
          - not_null

      - name: master_firm_id
        data_type: text
        description: "Master firm identifier"
        data_tests:
          - not_null

      - name: firm_name
        data_type: text
        description: "Name of the firm"

      - name: firm_type
        data_type: text
        description: "Type of firm"

      - name: firm_status
        data_type: text
        description: "Current firm status"

      - name: firm_npn
        data_type: text
        description: "Firm National Producer Number"

      - name: firm_tax_id
        data_type: text
        description: "Firm tax identification number"

      - name: firm_state
        data_type: text
        description: "State where the firm is located"

      - name: firm_city
        data_type: text
        description: "City where the firm is located"

      - name: firm_zip
        data_type: text
        description: "Firm zip code"

      - name: effective_date
        data_type: date
        description: "Firm effective date"

      - name: expiration_date
        data_type: date
        description: "Firm expiration date"

      - name: relationship_id
        data_type: number
        description: "Unique identifier for the producer-firm relationship"
        data_tests:
          - not_null
          - unique

      - name: fin_prof_dim_key
        data_type: number
        description: "Foreign key to FIN_PROF dimension"

      - name: relationship_type
        data_type: text
        description: "Type of relationship between producer and firm"

      - name: relationship_status
        data_type: text
        description: "Current status of the relationship"

      - name: relationship_start_date
        data_type: date
        description: "Relationship start date"

      - name: relationship_end_date
        data_type: date
        description: "Relationship end date"

      - name: commission_split_pct
        data_type: number
        description: "Commission split percentage"

      - name: primary_flag
        data_type: boolean
        description: "Whether this is the primary firm relationship"

      - name: created_at
        data_type: timestamp_ntz
        description: "Record creation timestamp"

      - name: updated_at
        data_type: timestamp_ntz
        description: "Record last updated timestamp"
